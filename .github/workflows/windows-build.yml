name: Windows Installer Build

# Builds EDMD.exe (PyInstaller launcher), collects the bundled GTK4 + Python
# runtime from MSYS2, and compiles the Inno Setup installer.
#
# The resulting installer ships a self-contained runtime — no MSYS2 required
# on user machines.
#
# Artifacts produced:
#   EDMD-Setup-{version}.exe     — Inno Setup installer (~300 MB)
#   EDMD-launcher-{version}.zip  — raw PyInstaller output (debugging)

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]*'
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version string (leave blank to use tag)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── 2. Determine version string ──────────────────────────────────────────
      - name: Write version helper script
        shell: bash
        run: |
          cat > get_version.py << 'PYEOF'
          import re
          t = open('core/state.py').read()
          m = re.search(r'VERSION\s*=\s*["\']([^"\']+)["\']', t)
          print(m.group(1) if m else 'dev')
          PYEOF

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(python get_version.py)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      # ── 3. Standard Python for PyInstaller ───────────────────────────────────
      - name: Set up Python (for PyInstaller)
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        shell: cmd
        run: pip install pyinstaller

      # ── 4. Build EDMD.exe launcher ───────────────────────────────────────────
      - name: Build launcher exe
        shell: cmd
        run: |
          pyinstaller "%GITHUB_WORKSPACE%\edmd_launcher.spec" --noconfirm --clean
          dir dist\EDMD\

      - name: Verify launcher
        shell: cmd
        run: |
          if not exist "dist\EDMD\EDMD.exe" (
            echo ERROR: EDMD.exe not found
            exit /b 1
          )
          echo EDMD.exe built successfully.
          dir dist\EDMD\EDMD.exe

      # ── 5. Set up MSYS2 with GTK4 + Python stack ─────────────────────────────
      # MSYS2 is used at BUILD TIME ONLY to collect the runtime.
      # The resulting dist\runtime\ directory is what ships to users —
      # they do not need MSYS2 installed on their machines.
      - name: Set up MSYS2 (build-time only)
        id: msys2_setup
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gtk4
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-gobject
            mingw-w64-ucrt-x86_64-python-psutil
            mingw-w64-ucrt-x86_64-python-pip
            mingw-w64-ucrt-x86_64-python-cryptography
            mingw-w64-ucrt-x86_64-adwaita-icon-theme

      # ── 6. Collect bundled runtime ────────────────────────────────────────────
      # Runs scripts\collect_runtime.ps1 which copies GTK4 DLLs, Python stdlib,
      # PyGObject, psutil, and pip-installs discord-webhook + cryptography into
      # dist\runtime\. Validates that all required imports work before proceeding.
      - name: Collect bundled runtime
        shell: pwsh
        timeout-minutes: 15
        run: |
          # Priority 1: use the msys2-location output from the setup step
          $msys2 = "${{ steps.msys2_setup.outputs.msys2-location }}"

          # Priority 2: common fixed paths (windows-latest typically uses C:\msys64)
          if (-not $msys2 -or -not (Test-Path "$msys2\ucrt64\bin\python.exe")) {
            foreach ($c in @("C:\msys64", "D:\msys64", "C:\msys2", "D:\msys2")) {
              if (Test-Path "$c\ucrt64\bin\python.exe") { $msys2 = $c; break }
            }
          }

          # Priority 3: derive root from bash.exe in PATH
          # setup-msys2 always adds {root}\usr\bin to PATH
          if (-not $msys2 -or -not (Test-Path "$msys2\ucrt64\bin\python.exe")) {
            $bash = (Get-Command bash -ErrorAction SilentlyContinue)?.Source
            if ($bash) {
              $msys2 = (Get-Item $bash).Directory.Parent.FullName
              Write-Host "Derived MSYS2 root from bash: $msys2"
            }
          }

          if (-not $msys2 -or -not (Test-Path "$msys2\ucrt64\bin\python.exe")) {
            throw "Cannot locate MSYS2. setup-msys2 output was: '${{ steps.msys2_setup.outputs.msys2-location }}'"
          }

          Write-Host "MSYS2 root: $msys2"
          .\scripts\collect_runtime.ps1 -Msys2Root $msys2 -OutDir dist\runtime

      - name: Verify runtime size
        shell: pwsh
        run: |
          $size = (Get-ChildItem dist\runtime -Recurse | Measure-Object -Property Length -Sum).Sum
          $mb = [math]::Round($size / 1MB, 1)
          Write-Host "Runtime size: ${mb} MB uncompressed"
          if ($size -lt 50MB) {
            Write-Error "Runtime looks too small (${mb} MB) — collection may have failed"
            exit 1
          }
          Write-Host "Runtime size OK."

      # ── 7. Update version in Inno Setup script ────────────────────────────────
      - name: Patch version in EDMD.iss
        shell: python
        run: |
          version = "${{ steps.version.outputs.version }}"
          path = "installer/EDMD.iss"
          with open(path, encoding="utf-8") as f:
              content = f.read()
          import re
          content = re.sub(
              r'(#define AppVersion\s+")[^"]*(")',
              rf'\g<1>{version}\g<2>',
              content
          )
          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Patched AppVersion to {version!r}")

      # ── 8. Create installer output directory ──────────────────────────────────
      - name: Create installer output dir
        shell: cmd
        run: mkdir dist\installer

      # ── 9. Validate ISS references runtime before invoking Inno Setup ─────────
      # Catches the silent failure case where an old EDMD.iss (without the
      # dist\runtime\ source line) was committed, producing a ~7 MB installer.
      - name: Validate ISS includes runtime
        shell: python
        run: |
          import sys, pathlib

          runtime = pathlib.Path("dist/runtime")
          if not runtime.exists():
              print("ERROR: dist/runtime missing — collect_runtime.ps1 did not run.")
              sys.exit(1)
          size_mb = sum(f.stat().st_size for f in runtime.rglob("*") if f.is_file()) // 1024 // 1024
          print(f"Runtime: {size_mb} MB")
          if size_mb < 50:
              print(f"ERROR: dist/runtime too small ({size_mb} MB). Collection failed.")
              sys.exit(1)

          iss = pathlib.Path("installer/EDMD.iss").read_text(encoding="utf-8")
          if "runtime" not in iss.lower():
              print("ERROR: installer/EDMD.iss does not reference the runtime.")
              print("Commit the new EDMD.iss which includes:")
              print('  Source: "..\\dist\\runtime\\*"; DestDir: "{app}\\runtime"; ...')
              sys.exit(1)
          print("ISS references runtime: OK")

      # ── 10. Compile Inno Setup installer ──────────────────────────────────────
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found — installing via choco..."
            choco install innosetup --no-progress -y
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using Inno Setup: $iscc"
          & $iscc installer\EDMD.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dir dist\installer\

      # ── 10. Verify installer was produced ─────────────────────────────────────
      - name: Verify installer
        shell: python
        run: |
          import pathlib, sys
          version = "${{ steps.version.outputs.version }}"
          matches = list(pathlib.Path("dist/installer").glob("EDMD-Setup-*.exe"))
          if not matches:
              print("ERROR: No EDMD-Setup-*.exe found in dist/installer/")
              sys.exit(1)
          p = matches[0]
          size_mb = p.stat().st_size // 1024 // 1024
          print(f"Installer: {p.name}  ({size_mb} MB)")
          if size_mb < 50:
              print(f"ERROR: Installer suspiciously small ({size_mb} MB)")
              sys.exit(1)

      # ── 11. Zip raw launcher for debugging ────────────────────────────────────
      - name: Zip launcher
        shell: pwsh
        run: |
          Compress-Archive -Path dist\EDMD\* `
            -DestinationPath "dist\installer\EDMD-launcher-${{ steps.version.outputs.version }}.zip"

      # ── 12. Upload artifacts ──────────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: EDMD-Windows-Installer-${{ steps.version.outputs.version }}
          path: |
            dist/installer/EDMD-Setup-*.exe
            dist/installer/EDMD-launcher-*.zip
          retention-days: 30

      # ── 13. Attach to GitHub Release if triggered by a tag ───────────────────
      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/EDMD-Setup-*.exe
            dist/installer/EDMD-launcher-*.zip
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
