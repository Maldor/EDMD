name: Windows Installer Build

# Builds EDMD.exe (PyInstaller launcher) and the Inno Setup installer.
# Triggers on release tags and can be run manually.
#
# Artifacts produced:
#   EDMD-Setup-{version}.exe   — Inno Setup installer
#   EDMD-launcher-{version}.zip — raw PyInstaller output (for testing)

on:
  push:
    tags:
      - '[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]*'   # date-based version tags
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version string (leave blank to use tag)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build-windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ── 2. Determine version string ───────────────────────────────────────
      - name: Write version helper script
        shell: bash
        run: |
          cat > get_version.py << 'PYEOF'
          import re
          t = open('core/state.py').read()
          m = re.search(r'VERSION\s*=\s*["\']([^"\']+)["\']', t)
          print(m.group(1) if m else 'dev')
          PYEOF

      - name: Set version
        id: version
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.version_override }}" ]; then
            VERSION="${{ github.event.inputs.version_override }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION=$(python get_version.py)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building version: ${VERSION}"

      # ── 3. Standard Python for PyInstaller (no MSYS2 needed for launcher) ─
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        shell: cmd
        run: pip install pyinstaller

      # ── 4. Build EDMD.exe launcher with PyInstaller ───────────────────────
      - name: Build launcher exe
        shell: cmd
        run: |
          echo Working dir: %CD%
          dir edmd_launcher.spec
          pyinstaller "%GITHUB_WORKSPACE%\edmd_launcher.spec" --noconfirm --clean
          dir dist\EDMD\

      # ── 5. Verify launcher builds and basic structure is present ──────────
      - name: Verify launcher
        shell: cmd
        run: |
          if not exist "dist\EDMD\EDMD.exe" (
            echo ERROR: EDMD.exe not found in dist\EDMD\
            exit /b 1
          )
          echo EDMD.exe built successfully.
          dir dist\EDMD\EDMD.exe

      # ── 6. Update version in Inno Setup script ────────────────────────────
      - name: Patch version in EDMD.iss
        shell: python
        run: |
          version = "${{ steps.version.outputs.version }}"
          path = "installer/EDMD.iss"
          with open(path, encoding="utf-8") as f:
              content = f.read()
          import re
          content = re.sub(
              r'(#define AppVersion\s+")[^"]*(")',
              rf'\g<1>{version}\g<2>',
              content
          )
          with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Patched AppVersion to {version!r} in {path}")

      # ── 7. Create output directory for installer ──────────────────────────
      - name: Create installer output dir
        shell: cmd
        run: mkdir dist\installer

      # ── 8. Compile Inno Setup installer ──────────────────────────────────
      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (-not (Test-Path $iscc)) {
            Write-Host "Inno Setup not found. Installing via choco..."
            choco install innosetup --no-progress -y
            $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          }
          Write-Host "Using Inno Setup at $iscc"
          & $iscc installer\EDMD.iss
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          dir dist\installer\

      # ── 9. Verify installer was produced ──────────────────────────────────
      - name: Verify installer
        shell: python
        run: |
          import pathlib, sys
          version = "${{ steps.version.outputs.version }}"
          expected = pathlib.Path(f"dist/installer/EDMD-Setup-{version}.exe")
          if not expected.exists():
              # Try any .exe in dist/installer/
              matches = list(pathlib.Path("dist/installer").glob("EDMD-Setup-*.exe"))
              if not matches:
                  print("ERROR: No EDMD-Setup-*.exe found in dist/installer/")
                  sys.exit(1)
              print(f"Found: {matches[0]} ({matches[0].stat().st_size // 1024 // 1024} MB)")
          else:
              print(f"Found: {expected} ({expected.stat().st_size // 1024 // 1024} MB)")

      # ── 10. Zip raw launcher for debugging ────────────────────────────────
      - name: Zip launcher
        shell: pwsh
        run: |
          Compress-Archive -Path dist\EDMD\* `
            -DestinationPath "dist\installer\EDMD-launcher-${{ steps.version.outputs.version }}.zip"

      # ── 11. Upload artifacts ──────────────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v6
        with:
          name: EDMD-Windows-Installer-${{ steps.version.outputs.version }}
          path: |
            dist/installer/EDMD-Setup-*.exe
            dist/installer/EDMD-launcher-*.zip
          retention-days: 30

      # ── 12. Attach to GitHub Release if triggered by a tag ────────────────
      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/installer/EDMD-Setup-*.exe
            dist/installer/EDMD-launcher-*.zip
          generate_release_notes: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
