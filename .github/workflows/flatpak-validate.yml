name: Flatpak Validate

# Builds and smoke-tests the EDMD Flatpak on every push to main and on pull
# requests.  Catches manifest regressions and import errors before they reach
# a release or a Flathub submission.
#
# This workflow runs generate_flatpak_release.py to produce an offline-source
# manifest (the same structure Flathub uses) and then builds it with the
# flatpak-github-actions builder.  If the build passes, it installs the
# bundle and runs a minimal smoke test.

on:
  push:
    branches: [main]
    paths:
      - 'flatpak/**'
      - 'scripts/generate_flatpak_release.py'
      - 'edmd.py'
      - 'core/**'
      - '.github/workflows/flatpak-validate.yml'
  pull_request:
    paths:
      - 'flatpak/**'
      - 'scripts/generate_flatpak_release.py'
      - 'edmd.py'
      - 'core/**'

permissions:
  contents: read

jobs:
  flatpak-build:
    name: Build and validate Flatpak
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v5

      # ── 2. Python + tools ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install manifest generation tools
        run: |
          pip install pyyaml
          # pip and pyyaml are all that's needed — no flatpak-pip-generator

      # ── 3. Generate release-style manifest with offline pip sources ───────────
      # We generate an offline-source manifest (same as what Flathub uses)
      # rather than building the development manifest with live pip installs.
      # This ensures validation CI catches any source-resolution problems
      # before they appear during Flathub submission.
      - name: Get current commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Generate offline manifest
        run: |
          python3 scripts/generate_flatpak_release.py \
            --tag dev-$(git rev-parse --short HEAD) \
            --commit ${{ steps.sha.outputs.sha }} \
            --output /tmp/flatpak-build/io.github.drworman.EDMD.yml
          echo "Generated manifest:"
          cat /tmp/flatpak-build/io.github.drworman.EDMD.yml

      # ── 4. Build with flatpak-github-actions ─────────────────────────────────
      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: edmd.flatpak
          manifest-path: /tmp/flatpak-build/io.github.drworman.EDMD.yml
          cache-key: flatpak-builder-${{ hashFiles('flatpak/io.github.drworman.EDMD.yml') }}

      # ── 5. Smoke test ────────────────────────────────────────────────────────
      # Install the bundle and verify that Python can import key modules
      # inside the sandbox.  We avoid launching the GTK4 GUI because GitHub
      # Actions runners have no display server.
      - name: Install bundle
        run: |
          flatpak --user install --noninteractive edmd.flatpak

      - name: Smoke test — Python environment
        run: |
          flatpak run --command=python3 io.github.drworman.EDMD \
            -c "
          import sys
          print(f'Python {sys.version}')

          results = []

          def check(name, code):
              try:
                  exec(code)
                  results.append((name, True, ''))
              except Exception as e:
                  results.append((name, False, str(e)))

          check('gi (PyGObject)',  'import gi')
          check('GTK4 import',    'import gi; gi.require_version(\"Gtk\",\"4.0\"); from gi.repository import Gtk')
          check('psutil',         'import psutil')
          check('discord_webhook','import discord_webhook')
          check('cryptography',   'import cryptography')
          check('edmd core',      'import sys; sys.path.insert(0, \"/app/edmd\"); import core.state')

          failed = [(n, e) for n, ok, e in results if not ok]
          for name, ok, _ in results:
              print(f\"  {'OK' if ok else 'FAIL'}  {name}\")
          if failed:
              print(f'\\nFailed: {[n for n, _ in failed]}')
              sys.exit(1)
          print('\\nAll checks passed.')
          "

      # ── 6. Upload bundle as artifact ─────────────────────────────────────────
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v6
        with:
          name: edmd-flatpak-${{ github.sha }}
          path: edmd.flatpak
          retention-days: 7
