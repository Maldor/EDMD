app-id: io.github.drworman.EDMD
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: edmd

finish-args:
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-config/EDMD:create
  - --filesystem=xdg-data/EDMD:create
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --env=PYTHONPATH=/app/lib/python3/site-packages

modules:

  # Python dependencies.
  # LOCAL DEVELOPMENT: live pip install (requires network during flatpak-builder build).
  # FLATHUB SUBMISSION: generate_flatpak_release.py replaces this module with the
  # output of flatpak-pip-generator, which contains pre-resolved offline wheel
  # sources. Flathub's build environment has no network access.
  - name: python3-edmd-deps
    buildsystem: simple
    build-commands:
      # --only-binary :all: prevents pip from trying to compile from source.
      # cryptography (maturin/Rust) and psutil (C extension) both fail to
      # build in the GNOME SDK — use their pre-built manylinux wheels instead.
      - pip3 install --no-build-isolation --only-binary :all: --prefix=/app
          "discord-webhook>=1.3.0" "cryptography>=41.0.0" "psutil>=5.9.0"
    sources: []

  # EDMD application.
  - name: edmd
    buildsystem: simple
    build-commands:
      - mkdir -p /app/edmd
      - cp -r . /app/edmd/
      - install -Dm755 flatpak/edmd-launcher /app/bin/edmd
      - install -Dm644 flatpak/io.github.drworman.EDMD.desktop
          /app/share/applications/io.github.drworman.EDMD.desktop
      - install -Dm644 flatpak/io.github.drworman.EDMD.metainfo.xml
          /app/share/metainfo/io.github.drworman.EDMD.metainfo.xml
      - install -Dm644 images/edmd_avatar_512.png
          /app/share/icons/hicolor/512x512/apps/io.github.drworman.EDMD.png
    sources:
      - type: git
        url: https://github.com/drworman/EDMD.git
        branch: main
        # generate_flatpak_release.py replaces `branch` with `tag` + `commit`
        # for Flathub submission.
